<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ナビコちゃん AR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',sans-serif; }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    pointer-events:none;
  }

  /* 中央の照準リング */
  #reticle {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px; height:64px;
    border:2px solid rgba(192,132,252,0.9);
    border-radius:50%;
    display:none;
    z-index:20;
    animation:reticlePulse 1.5s ease-in-out infinite;
  }
  #reticle::before {
    content:''; position:absolute; inset:6px;
    border:1px solid rgba(192,132,252,0.5);
    border-radius:50%;
  }
  #reticle::after {
    content:''; position:absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
    width:6px; height:6px;
    background:rgba(192,132,252,0.9);
    border-radius:50%;
  }
  @keyframes reticlePulse {
    0%,100% { box-shadow:0 0 0 0 rgba(192,132,252,0.4); }
    50%      { box-shadow:0 0 0 12px rgba(192,132,252,0); }
  }

  /* 吹き出し */
  #speech {
    position:fixed; top:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(26,13,53,0.92);
    border:1.5px solid rgba(192,132,252,0.8);
    border-radius:16px;
    padding:12px 20px;
    color:#faf5ff;
    font-size:14px;
    line-height:1.6;
    text-align:center;
    max-width:280px;
    backdrop-filter:blur(8px);
    display:none;
    z-index:30;
    animation:fadeInDown 0.4s ease both;
  }
  #speech::after {
    content:''; position:absolute;
    bottom:-12px; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:12px solid rgba(192,132,252,0.8);
  }
  @keyframes fadeInDown {
    from { opacity:0; transform:translateX(-50%) translateY(-10px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
  .hi  { color:#c084fc; font-weight:700; }
  .hi2 { color:#f472b6; font-weight:700; }

  /* 下部UI */
  #bottom-ui {
    width:100%; padding:0 0 48px;
    display:flex; flex-direction:column;
    align-items:center; gap:16px;
    pointer-events:auto;
  }

  #hint {
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(192,132,252,0.4);
    border-radius:24px;
    padding:10px 24px;
    color:#e9d5ff;
    font-size:13px;
    backdrop-filter:blur(6px);
    text-align:center;
  }

  #start-btn {
    background:linear-gradient(135deg,#7e22ce,#9333ea);
    border:none; border-radius:50px;
    color:#faf5ff; font-size:16px; font-weight:700;
    padding:16px 44px;
    box-shadow:0 0 32px rgba(147,51,234,0.6);
    cursor:pointer;
    letter-spacing:0.05em;
    animation:btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow:0 0 24px rgba(147,51,234,0.5); }
    50%      { box-shadow:0 0 44px rgba(192,132,252,0.8); }
  }

  #tap-hint {
    color:#e9d5ff; font-size:14px;
    background:rgba(0,0,0,0.55);
    border-radius:20px; padding:8px 20px;
    border:1px solid rgba(192,132,252,0.3);
    display:none;
  }

  #action-btns {
    display:none; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .action-btn {
    background:rgba(26,13,53,0.85);
    border:1.5px solid rgba(192,132,252,0.6);
    border-radius:50px;
    color:#e9d5ff; font-size:13px; font-weight:700;
    padding:9px 18px; cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .action-btn.pink {
    border-color:rgba(244,114,182,0.6);
    color:#fbcfe8;
  }

  /* 非対応メッセージ */
  #not-supported {
    position:fixed; inset:0;
    background:#0d0a1a;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    color:#faf5ff; text-align:center;
    padding:40px; z-index:100;
    gap:16px;
  }
  #not-supported h2 { color:#c084fc; font-size:20px; }
  #not-supported p  { color:#a78bfa; font-size:14px; line-height:1.7; }
  #not-supported .emoji { font-size:48px; }

  /* WebXR canvas */
  canvas { display:block; width:100vw; height:100vh; }

  /* キラキラパーティクル */
  .particle {
    position:fixed; pointer-events:none; z-index:25;
    border-radius:50%;
    animation:particleFly 1.2s ease-out forwards;
  }
  @keyframes particleFly {
    0%   { opacity:1; transform:translate(0,0) scale(1); }
    100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<div id="not-supported">
  <div class="emoji">📱</div>
  <h2>WebARを起動できませんでした</h2>
  <p>
    Androidの<strong>Chrome</strong>ブラウザ（最新版）でお試しください。<br><br>
    また、<strong>カメラの許可</strong>が必要です。<br>
    設定 → サイトの設定 → カメラ → 許可
  </p>
</div>

<div id="reticle"></div>
<div id="speech"></div>

<div id="overlay">
  <div id="bottom-ui">
    <div id="hint">📱 ARカメラを起動してナビコちゃんを召喚！</div>
    <button id="start-btn" onclick="startAR()">✨ ARを起動する</button>
    <div id="tap-hint">📍 地面をタップしてナビコちゃんを配置</div>
    <div id="action-btns">
      <button class="action-btn" onclick="naviko_say('こんにちは！今日は<br>どこへ行きたいですか？')">👋 あいさつ</button>
      <button class="action-btn pink" onclick="naviko_say('地図を確認中…🗺️<br><span class=&quot;hi2&quot;>最短ルート</span>を計算中！')">🗺️ ルート</button>
      <button class="action-btn" onclick="naviko_say('⭐ コンビニ（200m）<br>⭐ 駅（500m）<br>⭐ カフェ（650m）')">📍 周辺</button>
      <button class="action-btn pink" onclick="startDance()">💃 踊る</button>
    </div>
  </div>
</div>

<script type="module">
// ── Three.js + WebXR Hit Test ──────────────────────────────────────────
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

let camera, scene, renderer, xrSession, hitTestSource, hitTestSourceReq;
let reticleObj, navikoGroup, placed = false;
let mixer, clock, dancing = false;
let speechTimer = null;

const speechEl   = document.getElementById('speech');
const reticleEl  = document.getElementById('reticle');
const tapHint    = document.getElementById('tap-hint');
const actionBtns = document.getElementById('action-btns');
const startBtn   = document.getElementById('start-btn');
const hintEl     = document.getElementById('hint');

// ── WebXR 対応チェック ──────────────────────────────────────────────
window.startAR = async function() {
  if (!navigator.xr) { showNotSupported(); return; }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!supported) { showNotSupported(); return; }

  startBtn.style.display = 'none';
  hintEl.style.display   = 'none';

  initThree();
  await startXRSession();
};

function showNotSupported() {
  document.getElementById('not-supported').style.display = 'flex';
}

// ── Three.js 初期化 ─────────────────────────────────────────────────
function initThree() {
  scene    = new THREE.Scene();
  clock    = new THREE.Clock();
  camera   = new THREE.PerspectiveCamera();
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  // ライト
  const ambient = new THREE.AmbientLight(0xfaf5ff, 1.2);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xc084fc, 1.0);
  dirLight.position.set(1, 3, 2);
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xf472b6, 0.4);
  fillLight.position.set(-2, 1, -1);
  scene.add(fillLight);

  // ヒットテスト用レティクル（Three.js側）
  const reticleGeo = new THREE.RingGeometry(0.04, 0.06, 32).rotateX(-Math.PI/2);
  const reticleMat = new THREE.MeshBasicMaterial({ color:0xc084fc, side:THREE.DoubleSide });
  reticleObj = new THREE.Mesh(reticleGeo, reticleMat);
  reticleObj.matrixAutoUpdate = false;
  reticleObj.visible = false;
  scene.add(reticleObj);

  // ナビコちゃん（SVGをCanvasテクスチャでスプライトとして表示）
  navikoGroup = buildNaviko();
  navikoGroup.visible = false;
  scene.add(navikoGroup);
}

// ── ナビコちゃんをCanvasで描いてスプライト化 ───────────────────────
function buildNaviko() {
  const group = new THREE.Group();

  // SVGをCanvasに描画してテクスチャ生成
  const canvas = document.createElement('canvas');
  canvas.width  = 512;
  canvas.height = 768;
  const ctx = canvas.getContext('2d');

  // SVG文字列をImageとして描画
  const svgBlob = new Blob([navikoSVG()], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 512, 768);
    URL.revokeObjectURL(url);
    tex.needsUpdate = true;
  };
  img.src = url;

  const tex = new THREE.CanvasTexture(canvas);
  tex.premultiplyAlpha = true;

  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.55, 0.82, 1);  // 実寸スケール（メートル）
  sprite.position.y = 0.41;         // 地面から浮かせる
  group.add(sprite);

  // 足元の光の輪
  const ringGeo = new THREE.RingGeometry(0.08, 0.13, 32).rotateX(-Math.PI/2);
  const ringMat = new THREE.MeshBasicMaterial({ color:0xc084fc, side:THREE.DoubleSide, transparent:true, opacity:0.55 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = 0.005;
  group.add(ring);

  // 浮遊アニメ用データ
  group.userData.baseY = 0;
  group.userData.t     = 0;
  group.userData.ring  = ring;
  group.userData.sprite = sprite;

  return group;
}

  <ellipse cx="88" cy="97" rx="10" ry="6" fill="rgba(244,114,182,0.22)"/>
  <ellipse cx="152" cy="97" rx="10" ry="6" fill="rgba(244,114,182,0.22)"/>
  <path d="M 82 68 Q 80 50 94 42 Q 104 36 120 36 Q 136 36 146 42 Q 160 50 158 68 Q 148 56 138 58 Q 128 60 124 72 Q 120 58 120 56 Q 116 58 116 72 Q 112 60 102 58 Q 92 56 82 68 Z" fill="url(#hg)"/>

}

// ── WebXR セッション開始 ────────────────────────────────────────────
async function startXRSession() {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });
  } catch(e) {
    showNotSupported();
    return;
  }

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  const refSpace = await xrSession.requestReferenceSpace('viewer');
  hitTestSourceReq = await xrSession.requestHitTestSource({ space: refSpace });

  reticleEl.style.display = 'block';
  tapHint.style.display   = 'block';

  xrSession.addEventListener('select', onSelect);
  renderer.setAnimationLoop(renderXR);
}

// ── タップで配置 ────────────────────────────────────────────────────
function onSelect() {
  if (!reticleObj.visible) return;

  if (!placed) {
    navikoGroup.visible = true;
    placed = true;
    tapHint.style.display   = 'none';
    actionBtns.style.display = 'flex';
    spawnParticles();
    naviko_say('わあ！ここに来られたよ！✨<br><span class="hi">どこへでも</span>案内するね♪');
  }

  // 位置を更新
  navikoGroup.position.setFromMatrixPosition(reticleObj.matrix);
  navikoGroup.userData.baseY = navikoGroup.position.y;
}

// ── レンダリングループ ──────────────────────────────────────────────
function renderXR(timestamp, frame) {
  const dt = clock.getDelta();

  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const hitTestResults = frame.getHitTestResults(hitTestSourceReq);

    if (hitTestResults.length > 0) {
      const hit  = hitTestResults[0];
      const pose = hit.getPose(refSpace);
      reticleObj.visible = true;
      reticleObj.matrix.fromArray(pose.transform.matrix);
    } else {
      reticleObj.visible = false;
    }
  }

  // 浮遊アニメーション
  if (placed && navikoGroup.visible) {
    navikoGroup.userData.t += dt;
    const t = navikoGroup.userData.t;
    const floatY = Math.sin(t * 1.4) * 0.03;
    navikoGroup.position.y = navikoGroup.userData.baseY + floatY;

    // 光の輪のスケール
    const ringScale = 1 - floatY * 6;
    navikoGroup.userData.ring.scale.set(ringScale, ringScale, ringScale);

    // ダンスアニメ
    if (dancing) {
      navikoGroup.rotation.y = Math.sin(t * 8) * 0.35;
      navikoGroup.userData.sprite.scale.x = 0.55 + Math.abs(Math.sin(t * 8)) * 0.06;
    } else {
      navikoGroup.rotation.y += (0 - navikoGroup.rotation.y) * 0.05;
    }
  }

  renderer.render(scene, camera);
}

// ── セリフ表示 ──────────────────────────────────────────────────────
window.naviko_say = function(text) {
  speechEl.innerHTML = text;
  speechEl.style.display = 'block';
  speechEl.style.animation = 'none';
  void speechEl.offsetWidth;
  speechEl.style.animation = 'fadeInDown 0.4s ease both';
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => { speechEl.style.display = 'none'; }, 4000);
};

// ── ダンス ──────────────────────────────────────────────────────────
window.startDance = function() {
  dancing = true;
  naviko_say('やったー！🎉<br><span class="hi2">踊るのだいすき！</span>♪');
  setTimeout(() => { dancing = false; }, 3000);
};

// ── パーティクル演出 ────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#c084fc','#f472b6','#a78bfa','#fbbf24','#f9a8d4'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * 120 + 40;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.3}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}
</script>
</body>
