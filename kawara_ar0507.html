<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kawara-nyan AR</title>

<!-- importmap でThree.jsのモジュール解決 -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',sans-serif; }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    pointer-events:none;
  }

  #reticle-el {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px; height:64px;
    border:2px solid rgba(74,144,217,0.9);
    border-radius:50%; display:none; z-index:20;
    animation:reticlePulse 1.5s ease-in-out infinite;
  }
  #reticle-el::before { content:''; position:absolute; inset:6px; border:1px solid rgba(74,144,217,0.5); border-radius:50%; }
  #reticle-el::after  { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:6px; height:6px; background:rgba(74,144,217,0.9); border-radius:50%; }
  @keyframes reticlePulse {
    0%,100% { box-shadow:0 0 0 0 rgba(74,144,217,0.4); }
    50%      { box-shadow:0 0 0 12px rgba(74,144,217,0); }
  }

  #speech {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:rgba(10,25,60,0.92); border:1.5px solid rgba(74,144,217,0.8);
    border-radius:16px; padding:12px 20px; color:#f0f8ff;
    font-size:14px; line-height:1.6; text-align:center; max-width:280px;
    backdrop-filter:blur(8px); visibility:hidden; opacity:0;
    pointer-events:none; z-index:30;
    transition:opacity 0.3s ease, visibility 0s linear 0.3s;
  }
  #speech.show { visibility:visible; opacity:1; transition:opacity 0.3s ease, visibility 0s linear 0s; }
  #speech::after {
    content:''; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
    border-left:10px solid transparent; border-right:10px solid transparent;
    border-top:12px solid rgba(74,144,217,0.8);
  }

  #loading {
    position:fixed; inset:0; background:rgba(5,15,40,0.97);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; gap:20px; color:#f0f8ff; text-align:center; padding:24px;
  }
  .spinner { width:52px; height:52px; border:3px solid rgba(74,144,217,0.2); border-top-color:#4a90d9; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #load-msg { font-size:14px; color:#6baed6; }

  #not-supported {
    position:fixed; inset:0; background:#050f1e;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#f0f8ff; text-align:center; padding:40px; z-index:100; gap:16px;
  }
  #not-supported h2 { color:#4a90d9; font-size:20px; }
  #not-supported p  { color:#6baed6; font-size:14px; line-height:1.7; }

  #bottom-ui {
    width:100%; padding:0 0 48px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    pointer-events:auto;
  }
  #hint {
    background:rgba(0,0,0,0.65); border:1px solid rgba(74,144,217,0.4);
    border-radius:24px; padding:10px 24px; color:#b8d8f0; font-size:13px;
    backdrop-filter:blur(6px); text-align:center;
  }
  #start-btn {
    background:linear-gradient(135deg,#1a3a6b,#2255a0);
    border:none; border-radius:50px; color:#f0f8ff; font-size:16px; font-weight:700;
    padding:16px 44px; box-shadow:0 0 32px rgba(74,144,217,0.6);
    cursor:pointer; letter-spacing:0.05em;
    animation:btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow:0 0 24px rgba(74,144,217,0.5); }
    50%      { box-shadow:0 0 44px rgba(110,198,240,0.8); }
  }
  #tap-hint {
    color:#b8d8f0; font-size:14px; background:rgba(0,0,0,0.55);
    border-radius:20px; padding:8px 20px; border:1px solid rgba(74,144,217,0.3); display:none;
  }
  #action-btns { display:none; gap:10px; flex-wrap:wrap; justify-content:center; }
  .action-btn {
    background:rgba(10,25,60,0.85); border:1.5px solid rgba(74,144,217,0.6);
    border-radius:50px; color:#b8d8f0; font-size:13px; font-weight:700;
    padding:9px 18px; cursor:pointer; backdrop-filter:blur(6px);
  }
  .action-btn.orange { border-color:rgba(245,144,30,0.6); color:#fcd9a0; }

  #scale-ctrl {
    display:none; align-items:center; gap:10px;
    background:rgba(10,25,60,0.85); border:1px solid rgba(74,144,217,0.3);
    border-radius:50px; padding:8px 18px;
  }
  #scale-ctrl span { color:#6baed6; font-size:12px; }
  #scale-slider {
    -webkit-appearance:none; width:110px; height:4px;
    background:rgba(74,144,217,0.3); border-radius:2px; outline:none;
  }
  #scale-slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:#4a90d9; border-radius:50%; }

  #route-panel {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.85);
    width:min(320px,88vw); background:rgba(5,15,40,0.96);
    border:1.5px solid rgba(245,144,30,0.7); border-radius:20px;
    padding:20px 18px; z-index:50;
    visibility:hidden; opacity:0; pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0.3s;
    backdrop-filter:blur(12px); box-shadow:0 0 48px rgba(245,144,30,0.3);
  }
  #route-panel.show {
    visibility:visible; opacity:1; pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
    transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), visibility 0s linear 0s;
  }
  #route-panel h3 { color:#f5901e; font-size:14px; font-weight:700; text-align:center; margin-bottom:14px; }
  #route-panel .close-btn { position:absolute; top:10px; right:14px; background:none; border:none; color:#6baed6; font-size:18px; cursor:pointer; }
  .route-step { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid rgba(74,144,217,0.12); color:#e2e8f0; font-size:13px; line-height:1.5; }
  .route-step:last-child { border-bottom:none; }
  .route-icon { font-size:22px; flex-shrink:0; width:32px; text-align:center; }

  .particle { position:fixed; pointer-events:none; z-index:25; border-radius:50%; animation:particleFly 1.2s ease-out forwards; }
  @keyframes particleFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:40px">🐱</div>
  <div class="spinner"></div>
  <p id="load-msg">Kawara-nyan を読み込み中...</p>
</div>

<div id="not-supported">
  <div style="font-size:48px">📱</div>
  <h2>WebARを起動できませんでした</h2>
  <p>Androidの<strong>Chrome</strong>ブラウザ（最新版）でお試しください。<br><br>
  <strong>カメラの許可</strong>が必要です。</p>
</div>

<div id="overlay">
  <div id="reticle-el"></div>
  <div id="speech"></div>

  <div id="route-panel">
    <button class="close-btn" onclick="closeRoute()">✕</button>
    <h3>🗺️ 案内所までのルート</h3>
    <div class="route-step"><div class="route-icon">➡️</div><div>まっすぐ進んでください（約50m）</div></div>
    <div class="route-step"><div class="route-icon">↩️</div><div>交差点を右折してください（約30m）</div></div>
    <div class="route-step"><div class="route-icon">⤴️</div><div>階段を上がってください（2F）</div></div>
    <div class="route-step"><div class="route-icon">🏁</div><div><strong style="color:#f5901e">突き当たりを左</strong>です。案内所はすぐそこです！</div></div>
  </div>

  <div id="bottom-ui">
    <div id="hint">📱 ARカメラを起動してKawara-nyanを召喚！</div>
    <button id="start-btn" onclick="startAR()">✨ ARを起動する</button>
    <div id="tap-hint">📍 地面をタップしてKawara-nyanを配置</div>
    <div id="scale-ctrl">
      <span>サイズ</span>
      <input type="range" id="scale-slider" min="0.2" max="3" step="0.05" value="1" oninput="updateScale(this.value)">
      <span id="scale-val">1.0</span>
    </div>
    <div id="action-btns">
      <button class="action-btn" onclick="doGreet()">👋 あいさつ</button>
      <button class="action-btn orange" onclick="doRoute()">🗺️ 案内所ルート</button>
      <button class="action-btn" onclick="doSpin()">🔄 くるっと</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let camera, scene, renderer, xrSession, hitTestSource;
let reticleObj, kawaraGroup, placed = false;
let clock, mixer;
let speechTimer = null;
let targetScale = 1.0, currentScale = 1.0;
let glbScene = null, glbAnimations = [];

const loadMsg    = document.getElementById('load-msg');
const loadingEl  = document.getElementById('loading');
const speechEl   = document.getElementById('speech');
const reticleEl  = document.getElementById('reticle-el');
const tapHint    = document.getElementById('tap-hint');
const actionBtns = document.getElementById('action-btns');
const scaleCtrl  = document.getElementById('scale-ctrl');

// ── GLB 読み込み ─────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load(
  'kawara.glb',
  (gltf) => {
    glbScene      = gltf.scene;
    glbAnimations = gltf.animations || [];
    loadingEl.style.display = 'none';
    console.log('✓ GLB loaded');
  },
  (xhr) => {
    if (xhr.total > 0) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      loadMsg.textContent = `Kawara-nyan を読み込み中... ${pct}%`;
    }
  },
  (err) => {
    console.error('GLB error:', err);
    loadMsg.textContent = '⚠️ モデルの読み込みに失敗しました。kawara.glb を確認してください。';
  }
);

// ── AR起動 ───────────────────────────────────────────────────────────
window.startAR = async function() {
  if (!navigator.xr) { showNS(); return; }
  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if (!ok) { showNS(); return; }
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('hint').style.display = 'none';
  initThree();
  await startXRSession();
};

function showNS() { document.getElementById('not-supported').style.display = 'flex'; }

// ── Three.js 初期化 ──────────────────────────────────────────────────
function initThree() {
  scene    = new THREE.Scene();
  clock    = new THREE.Clock();
  camera   = new THREE.PerspectiveCamera();
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = true;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  scene.add(new THREE.AmbientLight(0xffffff, 2.0));
  const dir = new THREE.DirectionalLight(0xffffff, 2.0);
  dir.position.set(2, 5, 3); dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0xc8e8ff, 0.8);
  fill.position.set(-3, 2, -2); scene.add(fill);

  reticleObj = new THREE.Mesh(
    new THREE.RingGeometry(0.04, 0.065, 32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide })
  );
  reticleObj.matrixAutoUpdate = false;
  reticleObj.visible = false;
  scene.add(reticleObj);

  kawaraGroup = new THREE.Group();
  kawaraGroup.visible = false;
  scene.add(kawaraGroup);

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.08, 0.14, 40).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({ color:0x4a90d9, side:THREE.DoubleSide, transparent:true, opacity:0.45 })
  );
  ring.position.y = 0.003;
  kawaraGroup.add(ring);
  kawaraGroup.userData.ring = ring;
}

// ── GLBをシーンに追加 ────────────────────────────────────────────────
function attachGLB() {
  if (!glbScene) return;
  const model = glbScene.clone(true);

  const box  = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const maxD = Math.max(size.x, size.y, size.z);
  const sf   = 0.55 / maxD;
  model.scale.setScalar(sf);

  const box2 = new THREE.Box3().setFromObject(model);
  model.position.y = -box2.min.y;

  model.traverse(c => {
    if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
  });

  kawaraGroup.add(model);
  kawaraGroup.userData.model = model;

  if (glbAnimations.length > 0) {
    mixer = new THREE.AnimationMixer(model);
    mixer.clipAction(glbAnimations[0]).play();
  }
}

// ── XRセッション ─────────────────────────────────────────────────────
async function startXRSession() {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });
  } catch(e) { showNS(); return; }

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  const vSpace = await xrSession.requestReferenceSpace('viewer');
  hitTestSource = await xrSession.requestHitTestSource({ space: vSpace });

  reticleEl.style.display = 'block';
  tapHint.style.display   = 'block';
  xrSession.addEventListener('select', onSelect);
  renderer.setAnimationLoop(renderXR);
}

// ── タップで配置 ─────────────────────────────────────────────────────
function onSelect() {
  if (!reticleObj.visible) return;
  kawaraGroup.position.setFromMatrixPosition(reticleObj.matrix);
  kawaraGroup.userData.baseY = kawaraGroup.position.y;

  if (!placed) {
    attachGLB();
    kawaraGroup.visible      = true;
    placed                   = true;
    tapHint.style.display    = 'none';
    actionBtns.style.display = 'flex';
    scaleCtrl.style.display  = 'flex';
    spawnParticles();
    say('にゃ！ここに来たにゃ！✨<br>どこへでもご案内するにゃ♪');
  }
}

// ── レンダリング ─────────────────────────────────────────────────────
let elapsed = 0;
function renderXR(ts, frame) {
  const dt = clock.getDelta();
  elapsed += dt;
  if (mixer) mixer.update(dt);

  if (frame) {
    const rs   = renderer.xr.getReferenceSpace();
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length) {
      reticleObj.visible = true;
      reticleObj.matrix.fromArray(hits[0].getPose(rs).transform.matrix);
    } else {
      reticleObj.visible = false;
    }
  }

  if (placed && kawaraGroup.visible) {
    const floatY = Math.sin(elapsed * 1.2) * 0.018;
    kawaraGroup.position.y = (kawaraGroup.userData.baseY || 0) + floatY;
    const rs = 1 - floatY * 7;
    kawaraGroup.userData.ring.scale.set(rs, rs, rs);
    currentScale += (targetScale - currentScale) * 0.1;
    kawaraGroup.scale.setScalar(currentScale);

    // ビルボード：常にカメラの方向を向く（Y軸回転のみ）
    const modelPos = kawaraGroup.position;
    const camPos   = camera.position;
    const angle    = Math.atan2(camPos.x - modelPos.x, camPos.z - modelPos.z);
    kawaraGroup.rotation.y = angle;
  }

  renderer.render(scene, camera);
}

// ── セリフ・ボタン ────────────────────────────────────────────────────
function say(text) {
  speechEl.innerHTML = text;
  speechEl.classList.remove('show');
  void speechEl.offsetWidth;
  speechEl.classList.add('show');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => speechEl.classList.remove('show'), 5000);
}

window.updateScale = (v) => {
  targetScale = parseFloat(v);
  document.getElementById('scale-val').textContent = targetScale.toFixed(1);
};
window.doGreet = () => say('Kawara-nyanにゃ！<br>何でもお申し付けくださいにゃ！🐱');
window.doRoute = () => { document.getElementById('route-panel').classList.add('show'); say('案内所へのルートにゃ！🗺️'); };
window.closeRoute = () => document.getElementById('route-panel').classList.remove('show');
window.doSpin = () => {
  say('くるっとにゃ！🌀');
  let a = 0;
  const id = setInterval(() => { a += 0.12; kawaraGroup.rotation.y += 0.12; if(a >= Math.PI*2) clearInterval(id); }, 16);
};

// ── パーティクル ─────────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#4a90d9','#f5901e','#6ec6f0','#fcd9a0','#80c4e8','#fff'];
  const cx = innerWidth/2, cy = innerHeight/2;
  for (let i=0; i<28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*9+4, a = Math.random()*Math.PI*2, d = Math.random()*130+40;
    p.style.cssText = `width:${s}px;height:${s}px;left:${cx}px;top:${cy}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*0.3}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1600);
  }
}
</script>
</body>
</html>
